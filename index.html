<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>The Sound Vault: Everything Edition</title>
        <link rel="stylesheet" href="style.css"
    </head>

    <body>
    <h1>The Sound Vault: Everything Edition</h1>
    <input type="text" id="search" placeholder="search music...">
    <button onclick="showAllSongs()">All Songs</button>
    <button onclick="showFavorites()">Show Favorites</button>
    <div id="catalog"></div>

    <h2>Add a song</h2>
    
    <form id="songForm">
        <input type="text" id="title" placeholder="Song Title" required>
        <input type="text" id="artist" placeholder="Artist" required>
        <input type="text" id="culture" placeholder="Culture/Country" required>
        <input type="text" id="mood" placeholder="Mood" required>
        <input type="text" id="genre" placeholder="Genre" required>
        
        <button type="submit">Add songForm</button>

    </form>
    <script src="script.js"></script>
    </body>

</html>
